name: Manual Scout Run

on:
  workflow_dispatch:
    inputs:
      scout_name:
        description: "Scout name (leave empty for all enabled scouts)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  manual-run:
    name: Manual scout, analyze & export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCOUT_NAME: ${{ github.event.inputs.scout_name }}
        run: |
          if [ -n "$SCOUT_NAME" ]; then
            python -m cyber scout --name "$SCOUT_NAME"
          else
            python -m cyber scout
          fi

      - name: Run analysis
        run: python -m cyber analyze

      - name: Run export
        run: python -m cyber export

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update benchmark data [skip ci]"
          git push origin HEAD:ops
