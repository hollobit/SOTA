name: Librarian Weekly

on:
  schedule:
    # Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  librarian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run librarian health + trust
        run: python -m cyber librarian --health --trust

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: librarian weekly update"
          git push origin HEAD:ops
