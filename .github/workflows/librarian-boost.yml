name: Librarian Event Boost

on:
  repository_dispatch:
    types:
      - conference-boost
      - new-model-release

jobs:
  boost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run librarian trust recalc with boost
        run: python -m cyber librarian --trust

      - name: Run immediate collection
        run: python -m cyber collect --all

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: librarian event boost"
          git push
