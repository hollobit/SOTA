name: Discovery Agent

on:
  schedule:
    # Wed and Sat at 03:00 UTC
    - cron: "0 3 * * 3,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run discovery
        run: python -m cyber discover

      - name: Run collection (due sources)
        run: python -m cyber collect

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto-discovery update"
          git push origin HEAD:ops
