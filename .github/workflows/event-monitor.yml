name: Event Monitor — new model detection

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours

permissions:
  contents: read

jobs:
  monitor:
    name: Check for new model releases
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run release scout
        id: release
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m cyber scout --name hf-release-scout 2>&1 | tee scout-output.log
          if grep -q "Collected [1-9]" scout-output.log; then
            echo "new_models=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_models=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger benchmark update
        if: steps.release.outputs.new_models == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: new-model-detected
