<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Benchmark SOTA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <header class="border-b border-gray-800 px-6 py-4">
        <h1 class="text-2xl font-bold">LLM Benchmark SOTA Dashboard</h1>
        <p class="text-gray-400 text-sm mt-1">
            Last updated: <span id="last-updated">—</span>
            &middot; <span id="model-count">0</span> models
            &middot; <span id="benchmark-count">0</span> benchmarks
        </p>
    </header>

    <nav class="flex border-b border-gray-800 px-6" id="tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
        <button class="tab-btn" data-tab="trends">Trends</button>
        <button class="tab-btn" data-tab="comparison">Comparison</button>
        <button class="tab-btn" data-tab="explorer">Explorer</button>
        <button class="tab-btn" data-tab="changelog">Changelog</button>
    </nav>

    <main class="px-6 py-6">
        <section id="tab-overview" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="col-span-2">
                    <h2 class="text-lg font-semibold mb-4">SOTA Leaderboard</h2>
                    <div id="sota-table-container"></div>
                </div>
                <div>
                    <h2 class="text-lg font-semibold mb-4">Leaderboard Rankings</h2>
                    <div id="leaderboard-cards"></div>
                </div>
            </div>
            <div>
                <h2 class="text-lg font-semibold mb-4">Recent Changes</h2>
                <div id="recent-changes"></div>
            </div>
        </section>

        <section id="tab-leaderboard" class="tab-content hidden">
            <div class="flex gap-4 mb-6 flex-wrap">
                <select id="filter-category" class="bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="">All Categories</option>
                </select>
                <select id="filter-type" class="bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="">All Types</option>
                    <option value="proprietary">Proprietary</option>
                    <option value="open-weight">Open Weight</option>
                    <option value="open-source">Open Source</option>
                </select>
                <select id="filter-source" class="bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="">All Sources</option>
                </select>
                <input type="text" id="filter-search" placeholder="Search models..."
                       class="bg-gray-800 border border-gray-700 rounded px-3 py-2 w-64">
            </div>
            <div id="leaderboard-table-container"></div>
        </section>

        <section id="tab-trends" class="tab-content hidden">
            <div class="flex gap-4 mb-6">
                <select id="trend-benchmark" class="bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="">Select Benchmark</option>
                </select>
                <select id="trend-period" class="bg-gray-800 border border-gray-700 rounded px-3 py-2">
                    <option value="30">1 Month</option>
                    <option value="90">3 Months</option>
                    <option value="180">6 Months</option>
                    <option value="all">All Time</option>
                </select>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div id="trend-chart" class="h-96"></div>
                <div id="radar-chart" class="h-96"></div>
            </div>
            <div id="heatmap-chart" class="h-96 mt-6"></div>
        </section>

        <section id="tab-comparison" class="tab-content hidden">
            <div class="flex gap-4 mb-4 flex-wrap items-end">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Models (X-axis)</label>
                    <select id="cmp-models" multiple class="bg-gray-800 border border-gray-700 rounded px-3 py-1 w-72 h-40 text-sm"></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Benchmarks (Y-axis)</label>
                    <select id="cmp-benchmarks" multiple class="bg-gray-800 border border-gray-700 rounded px-3 py-1 w-56 h-40 text-sm"></select>
                </div>
                <div class="flex flex-col gap-2">
                    <button id="cmp-update" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm">Update</button>
                    <button id="cmp-reset" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Reset</button>
                </div>
            </div>
            <div id="cmp-matrix-container" class="overflow-x-auto"></div>
            <div id="cmp-radar-chart" class="h-96 mt-6"></div>
        </section>

        <section id="tab-explorer" class="tab-content hidden">
            <div class="flex gap-4 mb-6">
                <select id="compare-model-a" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 w-64">
                    <option value="">Select Model A</option>
                </select>
                <span class="self-center text-gray-500">vs</span>
                <select id="compare-model-b" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 w-64">
                    <option value="">Select Model B</option>
                </select>
                <button id="compare-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Compare</button>
            </div>
            <div id="comparison-result"></div>
        </section>

        <section id="tab-changelog" class="tab-content hidden">
            <div id="changelog-list"></div>
        </section>
    </main>

    <script src="js/charts.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/explorer.js"></script>
    <script src="js/comparison.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
