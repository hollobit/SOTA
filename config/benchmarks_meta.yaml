  - id: tdc_admet
    name: TDC ADMET Group
    category: chemistry
    metric: auc_or_mae
    unit: "%"
    expected_range: [60, 88]
    description: "Therapeutics Data Commons ADMET property prediction — 22-task average. ChemFM 79.0, TamGen 73.5, MoLFormer 72.3."
    paper: "https://tdcommons.ai/benchmark/admet_group/overview/"

