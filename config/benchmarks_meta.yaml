benchmarks:
  - id: mmlu
    name: MMLU
    category: knowledge
    metric: accuracy
    unit: "%"
    expected_range: [60, 95]
    description: "Massive Multitask Language Understanding - 57 subjects from STEM to humanities"

  - id: gpqa
    name: GPQA
    category: reasoning
    metric: accuracy
    unit: "%"
    expected_range: [30, 75]
    description: "Graduate-level Google-Proof Q&A - expert-level science questions"

  - id: humaneval
    name: HumanEval
    category: coding
    metric: pass@1
    unit: "%"
    expected_range: [40, 98]
    description: "Code generation benchmark - 164 Python programming problems"

  - id: math
    name: MATH
    category: math
    metric: accuracy
    unit: "%"
    expected_range: [30, 95]
    description: "Competition mathematics - 12,500 problems from AMC, AIME, and Olympiads"

  - id: gsm8k
    name: GSM8K
    category: math
    metric: accuracy
    unit: "%"
    expected_range: [60, 99]
    description: "Grade school math - 8,500 linguistically diverse grade school problems"

  - id: mmmu
    name: MMMU
    category: multimodal
    metric: accuracy
    unit: "%"
    expected_range: [30, 75]
    description: "Massive Multi-discipline Multimodal Understanding - college-level multimodal questions"

  - id: swe_bench
    name: SWE-bench
    category: coding
    metric: resolve_rate
    unit: "%"
    expected_range: [5, 60]
    description: "Software engineering benchmark - real GitHub issues from popular Python repos"

  - id: truthfulqa
    name: TruthfulQA
    category: safety
    metric: accuracy
    unit: "%"
    expected_range: [30, 85]
    description: "Truthfulness benchmark - 817 questions spanning health, law, finance, and politics"

  - id: ifeval
    name: IFEval
    category: instruction_following
    metric: accuracy
    unit: "%"
    expected_range: [40, 95]
    description: "Instruction following evaluation - verifiable instruction-following tasks"

  - id: aime
    name: AIME
    category: math
    metric: accuracy
    unit: "%"
    expected_range: [5, 90]
    description: "American Invitational Mathematics Examination - competition math problems"
